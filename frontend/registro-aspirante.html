<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Aspirante - Sistema de Citas de Matrícula</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .form-container {
            padding: 40px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 12px;
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
        }

        .alert.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Registro de Aspirante</h1>
            <p>Complete sus datos para continuar</p>
        </div>

        <div class="form-container">
            <div id="alert" class="alert"></div>

            <form id="registroForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre *</label>
                        <input type="text" id="nombre" placeholder="Juan Carlos" required>
                    </div>
                    <div class="form-group">
                        <label>Apellidos *</label>
                        <input type="text" id="apellidos" placeholder="Pérez Gómez" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Correo Electrónico *</label>
                    <input type="email" id="email" placeholder="juan.perez@universidad.edu" required>
                </div>

                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="telefono" placeholder="+503 7000 0000">
                </div>

                <div class="form-group">
                    <label>Carrera de Interés *</label>
                    <select id="carrera" required>
                        <option value="">Seleccione una carrera</option>
                        <option value="1">Ingeniería en Sistemas</option>
                        <option value="2">Ingeniería Civil</option>
                        <option value="3">Administración de Empresas</option>
                        <option value="4">Derecho</option>
                        <option value="5">Medicina</option>
                        <option value="6">Arquitectura</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Contraseña *</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <small style="color: #666; font-size: 12px;">Mínimo 6 caracteres</small>
                </div>

                <div class="form-group">
                    <label>Confirmar Contraseña *</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn">Registrarse</button>

                <div class="login-link">
                    ¿Ya tienes cuenta? <a href="login-aspirante.html">Iniciar Sesión</a>
                </div>
            </form>
        </div>

        <div class="footer">
            © 2024 Universidad. Todos los derechos reservados.
        </div>
    </div>

    <script>
        // URL de la API - Cambia el puerto si es necesario
        const API_URL = 'http://localhost:3000/api';

        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const apellidos = document.getElementById('apellidos').value;
            const email = document.getElementById('email').value;
            const telefono = document.getElementById('telefono').value;
            const id_carrera_elegida = document.getElementById('carrera').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const alertDiv = document.getElementById('alert');
            
            // Validaciones
            if (!nombre || !apellidos || !email || !password) {
                alertDiv.className = 'alert error';
                alertDiv.textContent = 'Por favor complete todos los campos obligatorios';
                return;
            }
            
            if (password !== confirmPassword) {
                alertDiv.className = 'alert error';
                alertDiv.textContent = 'Las contraseñas no coinciden';
                return;
            }
            
            if (password.length < 6) {
                alertDiv.className = 'alert error';
                alertDiv.textContent = 'La contraseña debe tener al menos 6 caracteres';
                return;
            }
            
            if (!id_carrera_elegida) {
                alertDiv.className = 'alert error';
                alertDiv.textContent = 'Por favor seleccione una carrera de interés';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/aspirantes/registro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nombre,        // ✅ Corregido: antes era "nombres"
                        apellidos,
                        email,
                        telefono,
                        id_carrera_elegida,
                        password
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    alertDiv.className = 'alert success';
                    alertDiv.textContent = 'Registro exitoso. Redirigiendo al login...';
                    
                    setTimeout(() => {
                        window.location.href = 'login-aspirante.html';
                    }, 2000);
                } else {
                    const error = await response.json();
                    alertDiv.className = 'alert error';
                    alertDiv.textContent = error.message || 'Error en el registro. El email podría estar duplicado.';
                }
            } catch (error) {
                // Demo: Simular registro exitoso (para pruebas sin backend)
                console.log('Error de conexión, usando modo demo:', error);
                alertDiv.className = 'alert success';
                alertDiv.textContent = 'Registro exitoso (Demo). Redirigiendo al login...';
                
                // Guardar en localStorage para demo
                const nuevoAspirante = {
                    id_aspirante: Date.now(),
                    nombre: nombre,
                    apellidos: apellidos,
                    email: email,
                    telefono: telefono,
                    id_carrera_elegida: id_carrera_elegida
                };
                localStorage.setItem('demoAspirante', JSON.stringify(nuevoAspirante));
                
                setTimeout(() => {
                    window.location.href = 'login-aspirante.html';
                }, 2000);
            }
        });
    </script>
</body>
</html>
