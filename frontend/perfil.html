<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Perfil</title>

<style>
/* 🔥 MISMO ESTILO EXACTO */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', Tahoma;
    background:#f5f5f5;
}

.navbar {
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
}

.nav-links a {
    color:white;
    margin-left:20px;
    cursor:pointer;
}

.container {
    max-width:1200px;
    margin:30px auto;
}

.card {
    background:white;
    padding:25px;
    border-radius:15px;
    margin-bottom:20px;
}

.btn {
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.profile-header {
    display:flex;
    gap:20px;
    align-items:center;
}

.avatar {
    width:80px;
    height:80px;
    border-radius:50%;
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>Sistema de Matrícula</h2>
    <div class="nav-links">
        <a onclick="mostrarPerfil()">Perfil</a>
        <a onclick="mostrarCitas()">Mis Citas</a>
        <a onclick="logout()">Salir</a>
    </div>
</div>

<div class="container">

<!-- PERFIL -->
<div class="card profile-header" id="perfil">
    <div class="avatar" id="avatar">JP</div>
    <div>
        <h2 id="nombre">Cargando...</h2>
        <p id="email"></p>
        <p id="telefono"></p>
        <p id="carrera"></p>
    </div>
</div>

<!-- ACCIONES -->
<div class="card" id="acciones">
    <h3>Acciones</h3>

    <button class="btn" onclick="abrirModal()">Solicitar Cita</button>
</div>

<!-- CITAS -->
<div class="card" id="citas" style="display:none;">
    <h3>Mis Citas</h3>
    <div id="listaCitas"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
    
    <div style="background:white; padding:20px; border-radius:10px; width:300px;">
        <h3>Solicitar Cita</h3>

        <input type="date" id="fecha"><br><br>

        <input type="time" id="hora"><br><br>

        <button class="btn" onclick="crearCita()">Confirmar</button>
        <button onclick="cerrarModal()">Cancelar</button>
    </div>

</div>

<script>

const API = "http://localhost:3000/api/matricula";

// 🔥 CARGAR PERFIL (demo o real)
function cargarPerfil() {
    const user = {
        nombre: "Juan Pérez",
        email: "juan@test.com",
        telefono: "8888-8888",
        carrera: "Ingeniería en Sistemas"
    };

    document.getElementById("nombre").innerText = user.nombre;
    document.getElementById("email").innerText = user.email;
    document.getElementById("telefono").innerText = user.telefono;
    document.getElementById("carrera").innerText = user.carrera;

    document.getElementById("avatar").innerText =
        user.nombre.charAt(0);
}

// 🔥 MOSTRAR CITAS (BACKEND REAL)
async function cargarCitas() {
    const res = await fetch(API + "/citas");
    const data = await res.json();

    document.getElementById("listaCitas").innerHTML =
        data.map(c => `
            <div class="card">
                ${c.fecha} - ${c.hora_inicio}
            </div>
        `).join("");
}

// 🔥 CREAR CITA (BACKEND REAL)
async function crearCita() {
    const fecha = document.getElementById("fecha").value;
    const hora = document.getElementById("hora").value;

    await fetch(API + "/citas", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id_carrera: 1,
            fecha,
            hora_inicio: hora,
            hora_fin: hora
        })
    });

    alert("Cita creada");
    cerrarModal();
    cargarCitas();
}

// UI
function abrirModal(){ document.getElementById("modal").style.display="flex"; }
function cerrarModal(){ document.getElementById("modal").style.display="none"; }

function mostrarPerfil(){
    document.getElementById("perfil").style.display="flex";
    document.getElementById("acciones").style.display="block";
    document.getElementById("citas").style.display="none";
}

function mostrarCitas(){
    document.getElementById("perfil").style.display="none";
    document.getElementById("acciones").style.display="none";
    document.getElementById("citas").style.display="block";
    cargarCitas();
}

function logout(){
    alert("Sesión cerrada");
}

// INIT
cargarPerfil();

</script>

</body>
</html>
